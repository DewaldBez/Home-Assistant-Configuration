homeassistant:
  # Name of the location where Home Assistant is running
  name: Home
  # Location required to calculate the time the sun rises and sets
  latitude: !secret latitude
  longitude: !secret longitude
  # Impacts weather/sunrise data (altitude above sea level in meters)
  elevation: 35
  # metric for Metric, imperial for Imperial
  unit_system: metric
  # Pick yours from here: http://en.wikipedia.org/wiki/List_of_tz_database_time_zones
  time_zone: Pacific/Auckland
  # Customization file
  customize: !include customize.yaml

# Enables the frontend
frontend:
  themes: !include_dir_merge_named themes

# Enables configuration UI
config:

recorder:
  purge_keep_days: 5
  purge_interval: 1

http:
  #api_password: !secret http_password
  base_url: !secret base_url
  use_x_forwarded_for: true
  trusted_proxies: 172.17.0.4
  cors_allowed_origins:
  - https://cast.home-assistant.io
  #trusted_networks: 192.168.0.1/24

# Checks for available updates
updater:

#Enables the system health component
system_health:

# Discover some devices automatically
discovery:
  ignore:
    - homekit

# Allows you to issue voice commands from the frontend in enabled browsers
conversation:

stream:

# Enables support for tracking state changes over time
history:

# View all events in a logbook
logbook:

# Enables a map showing the location of tracked devices
map:

# Track the sun
sun:

websocket_api:

hacs:
  token: !secret hacs_token

alarm_control_panel:
  - platform: manual
    name: Home Alarm

yeelight:
  devices:
    192.168.0.164:
      name: Living Room
    192.168.0.188:
      name: Dining Table
    192.168.0.49:
      name: Bedside Lamp
    192.168.0.144:
      name: Kitchen Lightstrip
    192.168.0.189:
      name: Corner Lamp

duckdns:
  domain: !secret domain
  access_token: !secret domain_access_token

weather:
  - platform: darksky
    api_key: !secret darksy_api_key

person:
  - name: personone
    id: personone101
    device_trackers:
      - device_tracker.personone_lan
      - device_tracker.personone_gps
  - name: persontwo
    id: persontwo101
    device_trackers:
      - device_tracker.persontwo_lan
      - device_tracker.persontwo_gps

# Text to speech
tts:
  - platform: google_translate
    service_name: google_say
    language: 'en-us'
    base_url: http://192.168.0.87:8123

zwave:
  usb_path: /dev/ttyACM0

hue:

device_tracker:
  - platform: nmap_tracker
    hosts: 192.168.0.1/24
    home_interval: 15
    consider_home: 180
    new_device_defaults:
      track_new_devices: True
      hide_if_away: False
    exclude:
     - 192.168.0.6
     - 192.168.0.7
     - 192.168.0.8

wake_on_lan:

ring:
  username: !secret ring_username
  password: !secret ring_password

camera:
  - platform: ring

  - platform: ffmpeg
    input: -rtsp_transport tcp -i rtsp://192.168.0.9:6554/stream_0
    name: Foyer

joaoapps_join:
  - name: android
    device_id: !secret join_device_id
    api_key: !secret join_api_key

google_assistant:
  project_id: homeassistant-c21w9
  #report_state: true
  expose_by_default: false
  entity_config:
    light.living_room_lights:
      name: Living Room Lights
      room: living room
      expose: true
    light.tv_backlight:
      name: TV Backlight
      room: living room
      expose: true
    light.corner_lamp:
      name: Corner Lamp
      room: bedroom
      expose: true
    light.bedroom_lightstrip:
      name: Bed Lightstrip
      room: bedroom
      expose: true
    light.bedside_lamp:
      name: Bedroom Bedside Lamp
      room: bedroom
      expose: true
    switch.bedroom_fan:
      name: Bedroom Fan
      room: bedroom
      expose: true
    light.kitchen_counter:
      name: Kitchen Lights
      room: kitchen
      expose: true
    light.office:
      name: Office Light
      room: office
      expose: true
    sensor.living_room_temperature:
      name: Living Room Temperature
      expose: true
      room: living room
    sensor.bedroom_sensor_temperature:
      name: Bedroom Temperature
      expose: true
      room: bedroom
    sensor.office_sensor_temperature:
      name: Office Temperature
      expose: true
      room: office
    vacuum.xiaomirobot:
      name: Vacuum
      expose: true
      room: living room
    media_player.living_room_tv_remote:
      name: Living Room TV
      expose: true
      room: living room
    camera.foyer:
      name: Foyer
      room: foyer

light:
  - platform: group
    name: Living Room Lights
    entities:
      - light.living_room
      - light.dining_table

  - platform: group
    name: Bedroom Lights
    entities:
      - light.bedside_lamp
      - light.corner_lamp

vacuum:
  - platform: xiaomi_miio
    name: XiaomiRobot
    host: 192.168.0.10
    token: !secret xiaomi_vac_token

media_player:
  - platform: smartir
    name: Living room TV Remote
    unique_id: living_room_tv_remote
    device_code: 1100
    controller_data: 192.168.0.115

automation: !include_dir_merge_list automations
script: !include scripts.yaml
switch: !include switches.yaml
binary_sensor: !include binary_sensor.yaml
sensor: !include sensors.yaml
notify: !include notify.yaml
input_boolean: !include input_booleans.yaml
zone: !include zones.yaml
group: !include groups.yaml