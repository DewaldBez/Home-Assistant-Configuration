#sensor:
  - platform: yr

  - platform: huesensor
  
  - platform: time_date
    display_options:
      - 'time'
      - 'date'
      - 'date_time'
      - 'time_date'
      - 'time_utc'
      - 'beat'

  - platform: template
    sensors:
      front_door_sensor:
        friendly_name: "Front Door"
        value_template: >-
          {% if is_state('binary_sensor.neo_coolcam_unknown_type_0003_id_6082_sensor', 'off') %}
            Closed
          {% else %}
            Open
          {% endif %}

  - platform: template
    sensors:
      back_door_sensor:
        friendly_name: "Back Door"
        value_template: >-
          {% if is_state('binary_sensor.neo_coolcam_unknown_type_0003_id_6082_sensor_2', 'off') %}
            Closed
          {% else %}
            Open
          {% endif %}         

  - platform: template
    sensors:
      living_room_temp:
        friendly_name: "Living Room Temp"
        unit_of_measurement: '°C'
        value_template: >-
          {{state_attr('binary_sensor.living_motion_room', 'temperature') | round(1)}}
          
  - platform: template
    sensors:
      bedroom_temp:
        friendly_name: "Bedroom Temp"
        unit_of_measurement: '°C'
        value_template: >-
          {{state_attr('binary_sensor.bedroom_motion_sensor', 'temperature') | round(1)}}

  - platform: template
    sensors:
      office_temp:
        friendly_name: "Office Temp"
        unit_of_measurement: '°C'
        value_template: >-
          {{state_attr('binary_sensor.office_motion_sensor', 'temperature') | round(1)}}
          
  - platform: template
    sensors:
      washing_machine_pw:
        friendly_name: "Washing Machine Power"
        unit_of_measurement: 'W'
        value_template: >-
          {{state_attr('switch.washing_machine', 'current_power_w') | float}}

  - platform: template
    sensors:
      washing_machine_status:
        friendly_name: "Washing Machine Status"
        value_template: >-
          {% if states('sensor.washing_machine_pw') > "1" %}
            Washing
          {% else %}
            Idle
          {% endif %}     

  - platform: waze_travel_time
    name: "PersonOne Work Commute"
    origin: !secret PersonOneOrig
    destination: !secret PersonOneDest
    region: 'AU'
  - platform: waze_travel_time
    name: "PersonOne Home Commute"
    origin: !secret PersonOneOrig
    destination: !secret PersonOneDest
    region: 'AU'
  - platform: waze_travel_time
    name: "PersonTwo Work Commute"
    origin: !secret PersonTwoOrig
    destination: !secret PersonTwoDest
    region: 'AU'
  - platform: waze_travel_time
    name: "PersonTwo Home Commute"
    origin: !secret PersonTwoOrig
    destination: !secret PersonTwoDest
    region: 'AU'

  - platform: mitemp_bt
    name: "Guest Bedroom"
    mac: !secret guesttempmac
    monitored_conditions:
      - temperature
      - humidity
      - battery

  - platform: rest
    name: foyertablet
    json_attributes:
      - batteryLevel
      - kioskMode
      - screenBrightness
      - motionDetectorState
      - maintenanceMode
      - appFreeMemory
      - appUsedMemory
      - totalFreeMemory
      - totalUsedMemory
      - hostname4
      - ip4
      - mac
      - locationLatitude
      - locationLongitude
      - locationAltitude
      - startUrl
      - currentPage
    resource: !secret fullykiosk
    value_template: '{{ value_json.motionDetectorState }}'